<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <article class="product">
            <picture class="img">
                <source srcset="images/image-product-desktop.jpg" media ="(min-width: 600px)">
                <img src="images/image-product-mobile.jpg" alt="perfume">
            </picture>

            <div class="content">
                <p class="category">Perfume</p>

                <h1 class="title">Gabrielle Essence Eau De Parfum</h1>

                <p>
                    A floral, solar and voluptuous interpretation composed by Olivier Polge,
                    Perfumer-Creator for the House of CHANEL.</p>

                <div class="price">
                    <p class="newprice"><span class="visually-hidden">Current price:</span>$149.99</p>
                    <p class="oldprice"><span class="visually-hidden">Original price:</span><s>$169.99</s></p>
                </div>
                <button class="button" data-icon="shopping-cart">Add to Cart</button>

            </div>
        </article>
    </main>
</body>
</html>
